<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        header {
            padding: 20px 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, transparent);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            align-items: center;
        }
        .logo {
            color: #e50914;
            font-size: 30px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .hero {
            height: 80vh;
            background: linear-gradient(to right, rgba(0,0	0,0.8), transparent), url('https://images.unsplash.com/photo-1626814026160-2237a95663e9?q=80&w=2070&auto=format&fit=crop') center/cover;
            display: flex;
            align-items: center;
            padding: 0 50px;
        }
        .hero-content {
            max-width: 600px;
        }
        .hero-title {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }
        .hero-description {
            font-		size: 1.2rem;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-play { background-color: white; color: black; margin-right: 10px; }
        .btn-info { background-color: rgba(109, 109, 110, 0.7); color: white; }
        .btn:hover { opacity: 0.8; }

        .row {
            padding: 20px 50px;
        }
        .row-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .posters {
            display: flex;
            overflow-x: scroll;
            padding: 20px 0;
        }
        .posters::-webkit-scrollbar { display: none; }
        .poster {
            flex: 0 0 auto;
            width: 200px;
            margin-right: 10px;
            transition: transform 0.3s ease;
            border-radius: 4px;
            cursor: pointer;
        }
        .poster:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">NETFLIX</div>
</header>

<section class="hero">
    <div class="hero-content">
        <h1 class="hero-title">Stranger Things</h1>
        <p class="hero-description">When a young boy vanishes, a small town uncovers a mystery involving secret experiments, terrifying forces in an alternate dimension, and strangely powerful psychic abilities.</p>
        <button class="btn btn-play">▶ Play</button>
        <button class="btn btn-info">ⓘ More Info</button>
    </div>
</section>

<section class="row">
    <h2 class="row-title">Trending Now</h2>
    <div class="posters">
        <img src="https://images.unsplash.com/photo-1626814026160-2237a95663e9?auto=format&fit=crop&w=400&q=80" class="poster" alt="Movie 1">
        <img src="https://images.unsplash.com/photo-15364401366락-846e97396047?auto=format&fit=crop&w=400&q=80" class="poster" alt="Movie 2">
        <img src="https://images.unsplash.com/photo-1509248961158-e54f69347494?auto=format&fit=crop&w=400&q=80" class="poster" alt="Movie 3">
        <img src="https://images.unsplash.com/photo-1594909122845-11bcd424b730?auto=format&fit=crop&w=400&q=80" class="poster" alt="Movie 4">
        <img src="https://imagesunsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=400&q=80" class="poster" alt="Movie 5">
    </div>
</section>

<section class="row">
    <h2 class="row-title">Action Thrillers</h2>
    <div class="posters">
        <img src="https://images.unsplash.com/photo-1533928298208-814908d91020?auto=format&fit=crop&w=400&q=80" class="poster" alt="Movie 6">
        <img src="https://images.unsplash.com/photo-1509248961158-e54f69347494?auto=format&fit=crop&w=400&q=80" class="poster" alt="Movie 7">
        <img src="https://images.unsplash.com/photo-15364401366락-846e97396047?auto=format&fit=crop&w=400&q=80" class="poster" alt="Movie 8">
        <img src="https://images.unsplash.com/photo-1626814026160-2237a95663e9?auto=format&fit=crop&w=400&q=80" class="poster" alt="Movie 9">
    </div>
</section>

</body>
</html>
